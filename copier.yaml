_subdirectory: template
project_name:
    type: str
    help: What is your project name?

_tasks:
    - command: "git init"
      when: "{{ _copier_operation == 'copy' }}"
    - command: "git add *"
      when: "{{ _copier_operation == 'copy' }}"
    - "cue mod tidy"
    - command: "cue export -f .pre-commit-config.yaml.cue --out yaml --outfile .pre-commit-config.yaml"
      when: "{{ _copier_operation == 'copy' }}"
    - command: "prek run --all-files"
      when: "{{ _copier_operation == 'copy' }}"


_jinja_extensions:
    - copier_template_extensions.TemplateExtensionLoader
    - extensions/cue_module_filter/cue_module_filter.py:CueModuleNameFilterExtension
